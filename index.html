<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo Web Application</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page" aria-labelledby="app-title">
    <table class="box">
      <tr>
        <td>
          <h1 id="app-title">Echo Web Application</h1>
          <p>This page echoes what you type.</p>

          <form id="echo-form">
            <label for="user-input">Enter text:</label>
            <input id="user-input" type="text" required>
            <button type="submit">Submit</button>
          </form>

          <hr>

          <p><b>Output:</b></p>
          <p id="echo-output">Nothing submitted yet.</p>
        </td>
      </tr>
    </table>
  </main>

  <script src="script.js"></script>
</body>
</html>
